<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#25237;&#36039;&#35264;&#28204;&#21488;&#20998;&#20139;&#29256;</title>
  <style>
    :root {
      --bg: #f6f5f1;
      --panel: #ffffff;
      --panel-2: #fbfaf7;
      --line: #ded9ce;
      --line-strong: #c9c2b5;
      --ink: #1d252c;
      --muted: #65717b;
      --soft: #eef1f0;
      --teal: #0f766e;
      --teal-soft: #d9f0ec;
      --blue: #245f9f;
      --blue-soft: #ddeafa;
      --amber: #b45309;
      --amber-soft: #faead1;
      --red: #b42318;
      --red-soft: #f9dedb;
      --green: #217346;
      --green-soft: #def2e5;
      --shadow: 0 1px 2px rgba(29, 37, 44, 0.08);
      --radius: 8px;
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 95, 159, 0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(15, 118, 110, 0.05) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: grid;
      gap: 2px;
      min-width: 280px;
    }

    .brand-title {
      font-weight: 800;
      font-size: 18px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      padding: 7px 11px;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }

    .btn.primary {
      border-color: #0b5f59;
      background: var(--teal);
      color: #ffffff;
    }

    .btn:disabled {
      cursor: default;
      opacity: 0.55;
      box-shadow: none;
    }

    .stock-copy-btn {
      font-size: 11px;
      padding: 2px 8px;
      min-height: unset;
      line-height: 1.5;
      opacity: 0.65;
      flex-shrink: 0;
      cursor: pointer;
    }
    .stock-copy-btn:hover {
      opacity: 1;
    }
    .stock-copy-btn.copied {
      color: var(--green);
      border-color: var(--green);
    }

    .copy-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .copy-status.success {
      color: var(--green);
    }

    .copy-status.error {
      color: var(--red);
    }

    .search-wrap {
      margin-left: auto;
      min-width: 260px;
      width: min(520px, 36vw);
    }

    .search {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 7px 10px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
    }

    .search:focus,
    select:focus,
    .btn:focus-visible {
      outline: 2px solid rgba(15, 118, 110, 0.32);
      outline-offset: 2px;
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 320px 1fr;
      overflow: hidden;
    }

    .sidebar {
      min-height: 0;
      border-right: 1px solid var(--line);
      background: rgba(251, 250, 247, 0.96);
      overflow-y: auto;
    }

    .sidebar-head {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 8px;
    }

    .statline {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 3px 8px;
    }

    .episode-list {
      overflow: auto;
      padding: 8px;
      display: grid;
      align-content: start;
      gap: 6px;
    }

    .episode-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      gap: 6px;
      color: var(--ink);
    }

    .episode-item:hover {
      background: var(--soft);
      border-color: var(--line);
    }

    .episode-item.active {
      background: var(--teal-soft);
      border-color: rgba(15, 118, 110, 0.35);
    }

    .episode-item.pending {
      border-color: var(--line);
      border-style: dashed;
    }

    .episode-item.pending.active {
      background: var(--amber-soft);
      border-color: rgba(180, 83, 9, 0.34);
    }

    .episode-name {
      font-weight: 750;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .episode-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .main {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 18px;
    }

    .episode-header {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .episode-title {
      font-size: 24px;
      line-height: 1.18;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .file-name {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .metric-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .metric {
      min-width: 86px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 8px 10px;
      box-shadow: var(--shadow);
    }

    .metric-value {
      font-weight: 800;
      font-size: 18px;
      line-height: 1;
    }

    .metric-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      min-height: 34px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 7px 10px;
      white-space: nowrap;
      color: var(--ink);
    }

    .tab.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #ffffff;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .select {
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      padding: 6px 9px;
    }

    .content-grid {
      display: grid;
      gap: 10px;
    }

    .section-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .card-title {
      min-width: 0;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
      flex-shrink: 0;
      min-width: 0;
    }

    .badge {
      max-width: 100%;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      line-height: 1.25;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
      white-space: nowrap;
      overflow-wrap: anywhere;
    }

    .badge.bullish,
    .badge.true {
      background: var(--green-soft);
      border-color: rgba(33, 115, 70, 0.25);
      color: var(--green);
    }

    .badge.watchful,
    .badge.company,
    .badge.sector,
    .badge.theme {
      background: var(--amber-soft);
      border-color: rgba(180, 83, 9, 0.26);
      color: var(--amber);
    }

    .badge.bearish,
    .badge.false {
      background: var(--red-soft);
      border-color: rgba(180, 35, 24, 0.22);
      color: var(--red);
    }

    .badge.neutral,
    .badge.market,
    .badge.macro,
    .badge.policy {
      background: var(--blue-soft);
      border-color: rgba(36, 95, 159, 0.22);
      color: var(--blue);
    }

    .body-text {
      color: var(--ink);
      line-height: 1.7;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .summary-stack {
      display: grid;
      gap: 12px;
    }

    .summary-block {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .summary-block-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 850;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .summary-block-title::before {
      content: "";
      width: 8px;
      height: 22px;
      border-radius: 999px;
      background: var(--teal);
      flex: 0 0 auto;
    }

    .summary-list {
      margin: 0;
      padding-left: 22px;
      line-height: 1.72;
    }

    .summary-list li {
      margin: 7px 0;
      overflow-wrap: anywhere;
    }

    .muted {
      color: var(--muted);
    }

    .quote {
      border-left: 4px solid var(--teal);
      background: var(--panel-2);
      padding: 10px 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin: 8px 0;
    }

    .points {
      margin: 8px 0 0;
      padding-left: 20px;
      line-height: 1.65;
    }

    .points li {
      margin: 5px 0;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      line-height: 1.5;
    }

    th {
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .ai-workspace {
      gap: 12px;
    }

    .ai-overview {
      display: grid;
      gap: 12px;
    }

    .ai-tab-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .ai-intel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .ai-intel-col {
      display: grid;
      gap: 12px;
    }

    .ai-tools-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .btn.primary.ai-hero-btn {
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 700;
    }

    .ai-action-row,
    .ai-link-row,
    .ai-chip-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ai-meta-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel-2);
    }

    .ai-meta-item {
      min-width: 0;
      padding: 10px 12px;
      border-right: 1px solid var(--line);
    }

    .ai-meta-item:last-child {
      border-right: 0;
    }

    .ai-meta-value {
      font-weight: 850;
      font-size: 20px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .ai-meta-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .ai-file-link {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 6px 9px;
      background: var(--panel-2);
      color: var(--ink);
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .ai-section-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel-2);
    }

    .ai-column {
      min-width: 0;
      padding: 12px;
      border-right: 1px solid var(--line);
    }

    .ai-column:last-child {
      border-right: 0;
    }

    .ai-column-title {
      font-size: 13px;
      font-weight: 850;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .ai-list {
      margin: 0;
      padding-left: 19px;
      line-height: 1.6;
    }

    .ai-list li {
      margin: 5px 0;
      overflow-wrap: anywhere;
    }

    .ai-theme-groups,
    .ai-task-list,
    .ai-reference-list {
      display: grid;
      gap: 8px;
    }

    .ai-theme-group,
    .ai-details {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      overflow: hidden;
    }

    .ai-theme-group summary,
    .ai-details summary {
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 850;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .ai-theme-count {
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      margin-left: 6px;
    }

    .ai-entity-row {
      display: grid;
      grid-template-columns: 86px minmax(110px, 0.8fr) minmax(150px, 1fr) minmax(220px, 2fr);
      gap: 10px;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    .ai-entity-code {
      font-weight: 850;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .ai-entity-name {
      font-weight: 800;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .ai-entity-role,
    .ai-entity-relation,
    .ai-reference-meta,
    .ai-reference-use,
    .ai-task-readout {
      color: var(--muted);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .ai-task-row {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .ai-task-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .ai-step {
      font-size: 13px;
      font-weight: 850;
      color: var(--teal);
      line-height: 1.3;
    }

    .ai-task-body {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .ai-task-title {
      font-weight: 850;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .ai-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      padding: 3px 8px;
      font-size: 12px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .ai-chip-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .ai-reference-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .ai-reference-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .ai-reference-title {
      font-weight: 800;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .ai-preview-body {
      padding: 12px;
      border-top: 1px solid var(--line);
    }

    .ai-code-box {
      max-height: 260px;
    }

    pre.raw {
      margin: 0;
      padding: 14px;
      background: #20262d;
      color: #f7f0df;
      border-radius: var(--radius);
      overflow: auto;
      line-height: 1.5;
      font-size: 13px;
      max-height: 70vh;
    }

    .prompt-output {
      max-height: none;
      white-space: pre-wrap;
    }

    .empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      text-align: center;
      padding: 22px;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .copy-status {
        width: 100%;
      }

      .search-wrap {
        width: 100%;
        min-width: 0;
        margin-left: 0;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 280px;
      }

      .main {
        padding: 14px;
      }

      .episode-title {
        font-size: 21px;
      }

      .card-head {
        display: grid;
      }

      .card-meta {
        justify-content: flex-start;
      }

      .ai-meta-strip,
      .ai-section-grid {
        grid-template-columns: 1fr;
      }

      .ai-meta-item,
      .ai-column {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .ai-meta-item:last-child,
      .ai-column:last-child {
        border-bottom: 0;
      }

      .ai-entity-row,
      .ai-task-row,
      .ai-reference-row {
        grid-template-columns: 1fr;
      }

      .ai-intel-grid,
      .ai-tools-row {
        grid-template-columns: 1fr;
      }

      .analysis-search-row,
      .analysis-toolbar,
      .analysis-flow,
      .analysis-grid {
        grid-template-columns: 1fr;
      }
    }

    .watchlist-pinned-btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .watchlist-pinned-btn:hover { background: #0a605a; }
    .watchlist-pinned-btn.active { background: #064e48; box-shadow: 0 0 0 2px var(--teal-soft); }

    .analysis-page { padding: 16px; display: grid; gap: 12px; }
    .analysis-header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 2px; }
    .analysis-header h2 { font-size: 1.1rem; font-weight: 800; margin: 0; }
    .analysis-meta { color: var(--muted); font-size: 0.78rem; line-height: 1.35; }
    .analysis-search-row { display: grid; grid-template-columns: minmax(220px, 1fr) auto; gap: 8px; align-items: center; }
    .analysis-search { width: 100%; }
    .analysis-saved-list { display: grid; gap: 10px; }
    .analysis-section-block { margin-top: 12px; min-width: 0; }
    .analysis-source-list { display: grid; gap: 5px; margin-top: 6px; }
    .analysis-source-list a { color: var(--blue); text-decoration: none; overflow-wrap: anywhere; line-height: 1.45; }
    .analysis-source-list a:hover { text-decoration: underline; }
    .analysis-toolbar { display: grid; grid-template-columns: 110px 150px minmax(180px, 1fr) auto; gap: 8px; align-items: center; }
    .analysis-input { min-height: 34px; border: 1px solid var(--line-strong); border-radius: var(--radius); background: var(--panel); color: var(--ink); padding: 6px 9px; min-width: 0; }
    .analysis-flow { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .analysis-step { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel-2); padding: 10px; min-height: 120px; }
    .analysis-step strong { display: block; margin-bottom: 6px; line-height: 1.35; }
    .analysis-step p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 0.82rem; }
    .analysis-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .analysis-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 720px; }

    .tw-page { padding: 16px; }

    .pf-table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); margin-bottom: 16px; }

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">投資觀測台</div>
        <div class="brand-subtitle">&#21488;&#32929;&#28165;&#21934;&#12289;Podcast &#30740;&#31350;&#31558;&#35352;&#33287;&#20491;&#32929;&#20998;&#26512;</div>
      </div>
      <div class="actions hidden">
        <button id="folderBtn" class="btn primary" type="button">選資料夾</button>
        <button id="filesBtn" class="btn" type="button">選 JSON 檔</button>
        <button id="clearBtn" class="btn" type="button" disabled>清除</button>
      </div>
      <button id="copyAllBtn" class="btn" type="button" disabled>複製本集全部</button>
      <span id="copyStatus" class="copy-status" aria-live="polite"></span>
      <div class="search-wrap">
        <input id="searchInput" class="search" type="search" placeholder="搜尋集數、標題、內容">
      </div>
      <input id="folderInput" class="hidden" type="file" accept=".json,application/json" webkitdirectory multiple>
      <input id="fileInput" class="hidden" type="file" accept=".json,application/json" multiple>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <button id="watchlistBtn" class="watchlist-pinned-btn" type="button">台股清單</button>
        <button id="analysisBtn" class="watchlist-pinned-btn" type="button">個股分析</button>
        <div id="episodeList" class="episode-list"></div>
      </aside>

      <main id="main" class="main">
        <div class="empty">尚未載入資料</div>
      </main>
    </div>
  </div>

  <script>
    const state = {
      episodes: [],
      pendingEpisodes: [],
      activeId: null,
      activePendingId: null,
      activeView: "episode",
      tab: getInitialTab(),
      query: "",
      stockUniverse: [],
      aiResearchByEpisode: {},
      aiReports: [],
      stockAnalysisNotes: [],
      stockAnalysisQuery: "",
      twWatchlist: null,
      analysis: {
        ticker: "2337",
        company: "旺宏",
        keyword: "2337 旺宏"
      },
      filters: defaultFilters()
    };

    const dom = {
      folderBtn: document.getElementById("folderBtn"),
      filesBtn: document.getElementById("filesBtn"),
      clearBtn: document.getElementById("clearBtn"),
      copyAllBtn: document.getElementById("copyAllBtn"),
      copyStatus: document.getElementById("copyStatus"),
      folderInput: document.getElementById("folderInput"),
      fileInput: document.getElementById("fileInput"),
      searchInput: document.getElementById("searchInput"),
      episodeList: document.getElementById("episodeList"),
      watchlistBtn: document.getElementById("watchlistBtn"),
      portfolioBtn: document.getElementById("portfolioBtn"),
      analysisBtn: document.getElementById("analysisBtn"),
      main: document.getElementById("main")
    };

    const tabOrder = [
      ["summary", "摘要"],
      ["news", "新聞"],
      ["hostDisclosure", "持倉"],
      ["stockAnalysis", "標的"],
      ["qa", "Q&A"],
      ["nextSteps", "下一步"],
      ["aiPrompt", "AI助理"]
    ];

    dom.folderBtn.addEventListener("click", chooseFolder);
    dom.filesBtn.addEventListener("click", () => dom.fileInput.click());
    dom.clearBtn.addEventListener("click", clearAll);
    dom.watchlistBtn.addEventListener("click", () => {
      state.activeView = state.activeView === "watchlist" ? "episode" : "watchlist";
      render();
    });
    if (dom.portfolioBtn) {
      dom.portfolioBtn.addEventListener("click", () => {
        state.activeView = state.activeView === "portfolio" ? "episode" : "portfolio";
        render();
      });
    }
    dom.analysisBtn.addEventListener("click", () => {
      state.activeView = state.activeView === "analysis" ? "episode" : "analysis";
      render();
    });
    dom.copyAllBtn.addEventListener("click", copyAllContent);
    dom.folderInput.addEventListener("change", event => loadFiles(Array.from(event.target.files)));
    dom.fileInput.addEventListener("change", event => loadFiles(Array.from(event.target.files)));
    dom.searchInput.addEventListener("input", event => {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    document.addEventListener("dragover", event => {
      event.preventDefault();
    });

    document.addEventListener("drop", event => {
      event.preventDefault();
      const files = Array.from(event.dataTransfer.files || []);
      if (files.length) loadFiles(files);
    });

    async function chooseFolder() {
      if (window.showDirectoryPicker) {
        try {
          const handle = await window.showDirectoryPicker();
          const files = await collectJsonFiles(handle);
          await loadFiles(files);
          return;
        } catch (error) {
          if (error && error.name === "AbortError") return;
        }
      }
      dom.folderInput.click();
    }

    async function collectJsonFiles(handle) {
      const files = [];
      async function walk(dirHandle) {
        for await (const entry of dirHandle.values()) {
          if (entry.kind === "file" && entry.name.toLowerCase().endsWith(".json")) {
            files.push(await entry.getFile());
          }
          if (entry.kind === "directory") {
            await walk(entry);
          }
        }
      }
      await walk(handle);
      return files;
    }

    async function tryLoadManifest() {
      try {
        const response = await fetch("manifests/podcast_json_manifest.json", { cache: "no-store" });
        if (!response.ok) return;
        const manifest = await response.json();
        const files = Array.isArray(manifest.files) ? manifest.files : [];
        const loaded = [];
        for (const fileName of files) {
          const fileResponse = await fetch(fileName, { cache: "no-store" });
          if (!fileResponse.ok) continue;
          const text = await fileResponse.text();
          loaded.push({
            name: fileName.split("/").pop(),
            text,
            lastModified: Date.now()
          });
        }
        if (loaded.length) {
          applyLoadedEntries(loaded, manifest.defaultFile || null);
        }
      } catch (error) {
        // Direct file opening commonly blocks fetch; manual loading remains available.
      }
    }

    async function tryLoadPendingManifest() {
      try {
        const response = await fetch("manifests/podcast_pending_manifest.json", { cache: "no-store" });
        if (!response.ok) return;
        const manifest = await response.json();
        const rows = Array.isArray(manifest.episodes) ? manifest.episodes : [];
        state.pendingEpisodes = rows.map((item, index) => buildPendingEpisode(item, index));
        render();
      } catch (error) {
        state.pendingEpisodes = [];
      }
    }

    async function tryLoadStockUniverse() {
      try {
        const response = await fetch("taiwan_stock_universe.json", { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        state.stockUniverse = Array.isArray(payload.stocks) ? payload.stocks : [];
        render();
      } catch (error) {
        state.stockUniverse = [];
      }
    }

    async function tryLoadTwWatchlistManifest() {
      try {
        const response = await fetch("manifests/tw_watchlists_manifest.json", { cache: "no-store" });
        if (!response.ok) return;
        const manifest = await response.json();
        const fileName = manifest.jsonFile || "tw_watchlists/tw_watchlist_latest.json";
        const fileResponse = await fetch(fileName, { cache: "no-store" });
        if (!fileResponse.ok) return;
        const payload = await fileResponse.json();
        state.twWatchlist = normalizeTwWatchlistPayload(payload, manifest);
        render();
      } catch (error) {
        state.twWatchlist = null;
      }
    }

    async function tryLoadAiResearchManifest() {
      try {
        const response = await fetch("manifests/ai_research_manifest.json", { cache: "no-store" });
        if (!response.ok) return;
        const manifest = await response.json();
        const rows = Array.isArray(manifest.files) ? manifest.files : [];
        const byEpisode = {};
        for (const row of rows) {
          const fileName = row.file || row.path || row.watchlistFile;
          if (!fileName) continue;
          const fileResponse = await fetch(fileName, { cache: "no-store" });
          if (!fileResponse.ok) continue;
          const payload = await fileResponse.json();
          const episodeNumber = Number(payload.episode || row.episode || getEpisodeNumber(fileName, payload)) || 0;
          if (episodeNumber > 0) {
            byEpisode[String(episodeNumber)] = payload;
          }
        }
        state.aiResearchByEpisode = byEpisode;
        render();
      } catch (error) {
        state.aiResearchByEpisode = {};
      }
    }

    async function tryLoadAiReportsManifest() {
      try {
        const response = await fetch("manifests/ai_reports_manifest.json", { cache: "no-store" });
        if (!response.ok) return;
        const manifest = await response.json();
        const rows = Array.isArray(manifest.files) ? manifest.files : [];
        const reports = [];
        for (const row of rows) {
          const fileName = row.reportFile || row.file || row.path;
          if (!fileName) continue;
          try {
            const fileResponse = await fetch(fileName, { cache: "no-store" });
            if (!fileResponse.ok) continue;
            reports.push({
              episode: Number(row.episode) || getEpisodeNumber(fileName, {}),
              file: fileName,
              sourceFile: row.sourceFile || "",
              generatedAt: row.generatedAt || "",
              text: await fileResponse.text()
            });
          } catch (error) {
          }
        }
        state.aiReports = reports.sort((a, b) => b.episode - a.episode);
        render();
      } catch (error) {
        state.aiReports = [];
      }
    }

    async function tryLoadStockAnalysisNotes() {
      try {
        const response = await fetch("stock_analysis_notes.json", { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        state.stockAnalysisNotes = Array.isArray(payload.analyses) ? payload.analyses : [];
        render();
      } catch (error) {
        state.stockAnalysisNotes = [];
      }
    }

    async function loadFiles(files) {
      const jsonFiles = files.filter(file => isLoadableAnalysisJson(file.name));
      const loaded = [];
      for (const file of jsonFiles) {
        try {
          loaded.push({
            name: file.webkitRelativePath || file.name,
            text: await file.text(),
            lastModified: file.lastModified || Date.now()
          });
        } catch (error) {
          console.warn("Failed to read file", file.name, error);
        }
      }
      applyLoadedEntries(loaded, null);
      dom.folderInput.value = "";
      dom.fileInput.value = "";
    }

    function isLoadableAnalysisJson(fileName) {
      const base = String(fileName || "").split(/[\\/]/).pop().toLowerCase();
      return /^ep\d+_analysis\.json$/.test(base);
    }

    function applyLoadedEntries(entries, preferredFileName) {
      const next = [];
      for (const entry of entries) {
        try {
          const data = JSON.parse(entry.text);
          next.push(buildEpisode(entry.name, data, entry.lastModified));
        } catch (error) {
          console.warn("Invalid JSON", entry.name, error);
        }
      }

      next.sort((a, b) => {
        if (b.number !== a.number) return b.number - a.number;
        return a.fileName.localeCompare(b.fileName, "zh-Hant");
      });

      state.episodes = next;
      state.activeId = getPreferredEpisodeId(next, preferredFileName);
      state.activePendingId = null;
      state.tab = getInitialTab();
      state.filters = defaultFilters();
      render();
    }

    function getPreferredEpisodeId(episodes, preferredFileName) {
      if (!episodes.length) return null;
      if (preferredFileName) {
        const wanted = preferredFileName.split(/[\\/]/).pop();
        const found = episodes.find(ep => ep.base === wanted || ep.fileName === preferredFileName);
        if (found) return found.id;
      }
      return episodes[0].id;
    }

    function buildEpisode(fileName, data, lastModified) {
      const base = fileName.split(/[\\/]/).pop() || fileName;
      const number = getEpisodeNumber(base, data);
      const title = getEpisodeTitle(base, data, number);
      return {
        id: `${base}:${lastModified}:${Math.random().toString(36).slice(2)}`,
        fileName,
        base,
        number,
        title,
        data,
        haystack: JSON.stringify(data).toLowerCase()
      };
    }

    function buildPendingEpisode(item, index) {
      const number = Number(item.number) || getEpisodeNumber(item.transcriptFile || item.title || "", {});
      const title = item.title || (number ? `EP${number}` : "待分析集數");
      const haystack = JSON.stringify(item).toLowerCase();
      return {
        id: `pending:${number || index}:${item.updatedAt || item.sourceUrl || index}`,
        number,
        title,
        data: item,
        haystack
      };
    }

    function getEpisodeNumber(fileName, data) {
      const candidates = [
        data.episode,
        data.episodeNumber,
        data.number,
        data.meta && data.meta.episode
      ];
      for (const value of candidates) {
        const n = Number(value);
        if (Number.isFinite(n) && n > 0) return n;
      }
      const match = fileName.match(/EP\s*0*(\d+)/i) || fileName.match(/(\d{2,5})/);
      return match ? Number(match[1]) : 0;
    }

    function getEpisodeTitle(fileName, data, number) {
      const direct = data.title || data.episodeTitle || data.name || (data.meta && data.meta.title);
      if (direct) return String(direct);
      const cleaned = fileName
        .replace(/\.json$/i, "")
        .replace(/_analysis$/i, "")
        .replace(/^EP\s*0*\d+[_\-\s]*/i, "")
        .replace(/_/g, " ")
        .trim();
      if (cleaned && cleaned.toLowerCase() !== "analysis") return `EP${number || ""} ${cleaned}`.trim();
      return number ? `EP${number}` : fileName.replace(/\.json$/i, "");
    }

    function clearAll() {
      state.episodes = [];
      state.pendingEpisodes = [];
      state.activeId = null;
      state.activePendingId = null;
      state.query = "";
      state.aiResearchByEpisode = {};
      state.filters = defaultFilters();
      dom.searchInput.value = "";

    function getActiveCopyEpisode(episodes = state.episodes, pendingEpisodes = state.pendingEpisodes) {
      if (state.activePendingId) {
        return pendingEpisodes.find(ep => ep.id === state.activePendingId) || null;
      }
      if (state.activeId) {
        return episodes.find(ep => ep.id === state.activeId) || null;
      }
      return null;
    }

    async function copyAllContent() {
      const ep = getActiveCopyEpisode();
      if (!ep) return;

      const text = state.activePendingId ? buildPendingCopyText(ep) : buildEpisodeCopyText(ep);
      try {
        await writeClipboard(text);
        setCopyStatus("已複製本集全部內容", "success");
      } catch (error) {
        console.warn("Copy failed", error);
        setCopyStatus("複製失敗，請改用瀏覽器允許剪貼簿權限", "error");
      }
    }

    async function writeClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "-9999px";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      const ok = document.execCommand("copy");
      textarea.remove();
      if (!ok) throw new Error("document.execCommand copy failed");
    }

    function setCopyStatus(text, type = "") {
      dom.copyStatus.textContent = text;
      dom.copyStatus.className = `copy-status${type ? ` ${type}` : ""}`;
      if (setCopyStatus.timer) clearTimeout(setCopyStatus.timer);
      if (text) {
        setCopyStatus.timer = setTimeout(() => {
          dom.copyStatus.textContent = "";
          dom.copyStatus.className = "copy-status";
        }, 2200);
      }
    }

      copyField(lines, "prompt", data.promptFile);

    function copySection(lines, title) {
      lines.push("", title, repeatChar("-", title.length + 4));
    }

    function copyObjects(lines, items, titleGetter, fields) {
      if (!items.length) {
        lines.push("節目未明確提及");
        return;
      }

      items.forEach((item, index) => {
        lines.push("", `${index + 1}. ${titleGetter(item, index)}`);
        if (fields) {
          fields.forEach(([label, key]) => copyField(lines, label, item[key], "   "));
        } else {
          copyField(lines, "內容", item, "   ");
        }
      });
    }

    function copyField(lines, label, value, prefix = "") {
      lines.push(`${prefix}${label}: ${formatCopyValue(value, prefix)}`);
    }

    function copyList(lines, label, values) {
      const list = arr(values);
      if (!list.length) {
        copyField(lines, label, "節目未明確提及");
        return;
      }
      lines.push(`${label}:`);
      list.forEach(item => lines.push(`- ${formatCopyValue(item)}`));
    }

    function formatCopyValue(value, prefix = "") {
      if (value === null || value === undefined || value === "") return "節目未明確提及";
      if (Array.isArray(value)) {
        if (!value.length) return "[]";
        if (value.every(item => item === null || typeof item !== "object")) {
          return value.map(item => stringify(item)).join(", ");
        }
        return `\n${value.map(item => `${prefix}  - ${formatCopyValue(item, `${prefix}  `)}`).join("\n")}`;
      }
      if (typeof value === "object") {
        return JSON.stringify(value, null, 2);
      }
      return String(value).replace(/\r\n/g, "\n").trim();
    }

    function cleanCopyText(lines) {
      return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    function repeatChar(char, length) {
      return new Array(Math.max(0, length) + 1).join(char);
    }

        summary: data.summary,
        news: data.news,
        stockAnalysis: data.stockAnalysis,
        nextSteps: data.nextSteps,
        qa: data.qa
      }).toLowerCase();

      const entities = dedupeEntities(getRepresentativeEntityRules()
        .filter(rule => rule.keywords.some(keyword => haystack.includes(keyword.toLowerCase())))
        .flatMap(rule => rule.entities));

      const tasks = buildAssistantTasks(next);
      const dashboard = buildAssistantDashboard(next, tasks);

      return {
        title: data.title || ep.title || episodeDisplayTitle(ep),
        episodeNumber: Number(data.episode || data.number || ep.number) || 0,
        entities,
        tasks,
        dashboard,
        blindSpots: buildBlindSpots(haystack),
        crowdingRisks: buildCrowdingRisks(next, data),
        reverseQuestions: buildReverseQuestions(haystack),
        xqCodes: entities
          .filter(item => item.market === "TW" && item.code)
          .map(item => `${item.code}.TW`)
      };

    function applyExternalAiResearch(payload, fallback) {
      if (!payload || typeof payload !== "object") return fallback;
      const source = payload.report && typeof payload.report === "object" ? payload.report : payload;
      const entities = normalizeAiEntities(arr(source.entities).length ? source.entities : source.entityMapping);
      const tasks = normalizeAiTasks(arr(source.tasks).length ? source.tasks : source.researchTasks);
      const dashboard = normalizeAiDashboard(source.dashboard || source.signalDashboard || {});
      const newsReferences = normalizeNewsReferences([
        ...arr(payload.newsReferences),
        ...arr(source.newsReferences)
      ]);
      const xqCodes = normalizeXqCodes([
        ...arr(payload.xqCodes),
        ...arr(source.xqCodes),
        ...entities.filter(item => item.market === "TW").map(item => item.code)
      ]);

      return {
        ...fallback,
        isExternalAi: true,
        generatedAt: payload.generatedAt || source.generatedAt || "",
        mode: payload.mode || "manual_chatgpt_with_web",
        usesLiveWebNews: payload.usesLiveWebNews !== false,
        newsReferences,
        entities: entities.length ? entities : fallback.entities,
        tasks: tasks.length ? tasks : fallback.tasks,
        dashboard: {
          leading: dashboard.leading.length ? dashboard.leading : fallback.dashboard.leading,
          confirming: dashboard.confirming.length ? dashboard.confirming : fallback.dashboard.confirming,
          negative: dashboard.negative.length ? dashboard.negative : fallback.dashboard.negative
        },
        blindSpots: arr(source.blindSpots).length ? arr(source.blindSpots) : fallback.blindSpots,
        crowdingRisks: arr(source.crowdingRisks).length ? arr(source.crowdingRisks) : fallback.crowdingRisks,

        ticker: item.ticker || "",
        name: item.name || item.company || "",
        theme: item.theme || item.sector || item.topic || "",
        role: item.role || item.supplyChainRole || item.position || "",
        relation: item.relation || item.reason || item.evidence || item.thesis || ""

      return arr(values).map((item, index) => ({

        negative: arr(value.negative).length ? arr(value.negative) : arr(value.riskTriggers || value.breakPoints)

    function normalizeNewsReferences(values) {
      const seen = new Set();
      return arr(values).map(item => {
        const url = item.url || item.link || "";

        const key = `${title}|${url}`;
        if (seen.has(key)) return null;
        seen.add(key);
        return {
          title,
          source: item.source || item.publisher || item.site || "",
          publishedAt: item.publishedAt || item.date || item.time || "",
          url,
          usedFor: item.usedFor || item.relevance || item.summary || ""

    function normalizeXqCodes(values) {
      const seen = new Set();
      return arr(values).map(normalizeXqCode).filter(Boolean).filter(code => {

        seen.add(code);
        return true;
      });

    function tw(code, fallbackName, theme, role, relation) {
      const found = state.stockUniverse.find(item => item.code === code);
      return {
        market: "TW",
        code,
        ticker: "",
        name: found ? found.name : fallbackName,
        theme,
        role,
        relation
      };
    }

    function us(ticker, name, theme, role, relation) {
      return { market: "US", code: ticker, ticker, name, theme, role, relation };
    }

    function dedupeEntities(entities) {
      const seen = new Map();
      entities.forEach(item => {
        const key = `${item.market}:${item.code || item.name}`;
        if (!seen.has(key)) {
          seen.set(key, { ...item });
          return;
        }
        const current = seen.get(key);
        current.theme = unique([current.theme, item.theme].filter(Boolean).join(" / ").split(" / ")).join(" / ");
        current.relation = current.relation || item.relation;
      });
      return Array.from(seen.values());
    }

    function buildAssistantTasks(next) {
      return arr(next.researchPlan).map((item, index) => {
        const text = [
          item.task,
          item.purpose,
          item.howToUseResult,
          ...arr(item.neededData)
        ].join(" ").toLowerCase();
        return {
          step: item.step || index + 1,
          task: item.task || "未命名任務",
          sources: recommendSources(text),
          keywords: recommendKeywords(text, item),
          readout: item.howToUseResult || "查完後用來判斷題材是否能從敘事進入財務驗證。"
        };
      });
    }

    function recommendSources(text) {
      const sources = ["公開資訊觀測站", "月營收公告", "財報三率", "法說會簡報/逐字稿"];
      if (/報價|交期|缺|漲價|現貨|庫存/.test(text)) sources.push("通路商法說", "產業報價新聞", "同業公告");
      if (/毛利|財報|營收|獲利/.test(text)) sources.push("Goodinfo/財報狗/XQ 財務資料", "券商產業報告");
      if (/產能|擴產|資本支出|capex|包產/.test(text)) sources.push("重大訊息", "公司年報", "資本支出新聞");
      if (/技術|線型|五日|十日|成交量|回檔/.test(text)) sources.push("XQ 技術線圖", "籌碼與成交量資料");
      if (/tpu|asic|google|nvidia|blackwell|gb200/.test(text)) sources.push("供應鏈新聞", "客戶平台發表會", "法說 Q&A");
      return unique(sources);
    }

    function recommendKeywords(text, item) {
      const keywords = arr(item.neededData).map(value => stringify(value)).filter(Boolean);
      if (/被動|mlcc|電容|電感|電阻/.test(text)) keywords.push("高壓 MLCC", "47uF", "22uF", "snap-in", "牛角電容", "交期", "漲價");
      if (/power|功率|電源/.test(text)) keywords.push("power rack", "AI 機櫃", "功率元件", "MOSFET", "電源模組");
      if (/tpu|asic/.test(text)) keywords.push("TPU", "AI ASIC", "Google", "客製化晶片", "先進封裝");
      if (/osat|封測|產能/.test(text)) keywords.push("OSAT", "先進封裝", "產能利用率", "包產線", "資本支出");
      if (/光通|雷射/.test(text)) keywords.push("雷射", "光模組", "800G", "1.6T", "CPO");
      return unique(keywords).slice(0, 14);
    }

    function buildAssistantDashboard(next, tasks) {
      const validation = arr(next.validationSignals);
      const risks = arr(next.riskTriggers);
      const leading = unique([
        ...validation.flatMap(item => arr(item.positiveSignals)),
        "報價新聞與漲價函",
        "現貨市場與交期變化",
        "同業擴產/停止接單/包產宣告"
      ]).slice(0, 14);
      const confirming = unique([
        ...tasks.flatMap(item => item.keywords).filter(value => /營收|毛利|財報|法說|稼動率|利用率/.test(value)),
        "下月營收 YoY/MoM",
        "季報毛利率與營益率",
        "法說會對產品線與交期的口徑",
        "AI 客戶或平台量產時程"
      ]).slice(0, 12);
      const negative = unique([
        ...validation.flatMap(item => arr(item.negativeSignals)),
        ...risks.map(item => item.trigger).filter(Boolean),
        "利多公布後股價無法轉強",
        "報價鬆動或交期縮短"
      ]).slice(0, 14);
      return { leading, confirming, negative };
    }

        items.push("TPU/ASIC 題材要確認客戶實際採用與軟體生態，不是只有晶片供應鏈敘事。");

        items.push("CSP 資本支出若從不計代價轉向 ROI 審查，整條 AI 零組件鏈都會被重新估值。");

    function buildCrowdingRisks(next, data) {
      const secondary = arr(next.priorityThemes)
        .filter(item => item.priority === "secondary" || item.priority === "background")
        .map(item => `${item.theme}: 若主線吸金，可能被降權為等待營收或資金回流的觀察線。`);
      const watchful = arr(data.stockAnalysis)
        .filter(item => item.sentiment === "watchful")
        .slice(0, 6)
        .map(item => `${item.name}: 題材未進入主線或缺乏新證據時，容易被提款。`);
      return unique([...secondary, ...watchful]).slice(0, 10);
    }

    function buildAiAssistantReportText(report) {
      const lines = [
        report.title,
        repeatChar("=", 28),
        report.isExternalAi ? "來源: 人工更新 AI+即時新聞研究檔" : "來源: 本機規則預覽",
        report.generatedAt ? `更新時間: ${report.generatedAt}` : "",
        "",
        "即時新聞參考"
      ];
      arr(report.newsReferences).forEach(item => {
        lines.push(`- ${item.source || "來源未標示"}｜${item.publishedAt || "日期未標示"}｜${item.title || ""}${item.url ? `｜${item.url}` : ""}`);
        if (item.usedFor) lines.push(`  用於判斷: ${item.usedFor}`);
      });
      if (!arr(report.newsReferences).length) {
        lines.push("- 尚未建立人工新聞更新檔");
      }
      lines.push(
        "",
        "1. 主線概念落地化"
      );
      report.entities.forEach(item => {
        lines.push(`- ${item.name} (${item.code || item.ticker})｜${item.market}｜${item.theme}｜${item.role}｜${item.relation}`);
      });
      lines.push("", "2. 研究任務執行方案");
      report.tasks.forEach(item => {
        lines.push(`- Step ${item.step}: ${item.task}`);
        lines.push(`  資料管道: ${item.sources.join(", ")}`);
        lines.push(`  關鍵字: ${item.keywords.join(", ")}`);
        lines.push(`  判讀: ${item.readout}`);
      });
      lines.push("", "3. 訊號監控儀表板");
      copyList(lines, "領先指標（短）", report.dashboard.leading);
      copyList(lines, "落後確認（中）", report.dashboard.confirming);
      copyList(lines, "破局/降權訊號", report.dashboard.negative);
      lines.push("", "4. 盲點與延伸思考");
      copyList(lines, "邏輯漏洞", report.blindSpots);
      copyList(lines, "資金排擠", report.crowdingRisks);
      copyList(lines, "反向問題", report.reverseQuestions);
      return cleanCopyText(lines);
    }

    function render() {
      const episodes = getFilteredEpisodes();
      const pendingEpisodes = getFilteredPendingEpisodes();

      if (state.activeView === "episode") {
        if (state.activePendingId && !pendingEpisodes.some(ep => ep.id === state.activePendingId)) {
          state.activePendingId = null;
        }
        if (state.activePendingId) {
          state.activeId = null;
        } else if (!state.activeId || !episodes.some(ep => ep.id === state.activeId)) {
          state.activeId = episodes[0] ? episodes[0].id : null;
          if (!state.activeId && pendingEpisodes.length) {
            state.activePendingId = pendingEpisodes[0].id;
          }
        }
      }

      dom.watchlistBtn.classList.toggle("active", state.activeView === "watchlist");
      if (dom.portfolioBtn) dom.portfolioBtn.classList.toggle("active", state.activeView === "portfolio");
      dom.analysisBtn.classList.toggle("active", state.activeView === "analysis");
      renderEpisodeList(episodes, pendingEpisodes);

      if (state.activeView === "watchlist") {
        renderTwWatchlistMain();
      } else if (state.activeView === "portfolio") {
        renderPortfolioMain();
      } else if (state.activeView === "analysis") {
        renderStockAnalysisFrameworkMain();
      } else if (state.activePendingId) {
        renderPendingMain(pendingEpisodes.find(ep => ep.id === state.activePendingId));
      } else {
        renderMain(episodes.find(ep => ep.id === state.activeId));
      }
      dom.clearBtn.disabled = state.episodes.length === 0 && state.pendingEpisodes.length === 0;
      dom.copyAllBtn.disabled = !getActiveCopyEpisode(episodes, pendingEpisodes);
    }

    function getFilteredEpisodes() {
      if (!state.query) return state.episodes;
      return state.episodes.filter(ep => {
        return ep.title.toLowerCase().includes(state.query) ||
          ep.base.toLowerCase().includes(state.query) ||
          ep.haystack.includes(state.query);
      });
    }

    function getFilteredPendingEpisodes() {
      if (!state.query) return state.pendingEpisodes;
      return state.pendingEpisodes.filter(ep => {
        return ep.title.toLowerCase().includes(state.query) ||
          ep.haystack.includes(state.query);
      });

    function metric(value, label) {
      const box = document.createElement("div");
      box.className = "metric";

    function episodeDisplayTitle(ep) {
      const base = ep.number ? `EP${ep.number}` : ep.title;
      const date = getEpisodeDate(ep.data);
      return date ? `${base} · ${date}` : base;
    }

    function getEpisodeDate(data) {
      const candidates = [
        data.date,
        data.episodeDate,
        data.pubDate,
        data.meta && data.meta.date,
        data.metadata && data.metadata.date
      ];

      for (const value of candidates) {
        if (!value) continue;
        const text = String(value);
        const match = text.match(/\d{4}-\d{2}-\d{2}/);
        if (match) return match[0];
        const parsed = new Date(text);
        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toISOString().slice(0, 10);
        }
      }
      return "";
    }

    function renderTabs(ep) {
      const tabs = document.createElement("nav");
      tabs.className = "tabs";
      for (const [key, label] of tabOrder) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tab${state.tab === key ? " active" : ""}`;
        const count = tabCount(ep, key);
        button.textContent = `${label}${count}`;
        button.addEventListener("click", () => {
          state.tab = key;
          if (window.history && window.history.replaceState) {
            window.history.replaceState(null, "", `#${key}`);
          }
          render();
        });
        tabs.appendChild(button);
      }
      return tabs;
    }

    function tabCount(ep, key) {
      if (key === "summary" || key === "raw" || key === "aiPrompt") return "";
      if (key === "nextSteps") {
        const count = nextStepCount(ep.data.nextSteps);
        return count ? ` ${count}` : "";
      }
      return ` ${arr(ep.data[key]).length}`;
    }

      const allowed = ["summary", "news", "hostDisclosure", "stockAnalysis", "qa", "nextSteps", "aiPrompt"];

      const hashTab = window.location.hash ? window.location.hash.slice(1) : "";
      const wanted = queryTab || hashTab || "nextSteps";
      return allowed.includes(wanted) ? wanted : "summary";
    }

    function buildStockAnalysisCopyText(item) {
      const lines = [];
      const titleLine = `${item.ticker || ""} ${item.company || ""}`.trim();
      if (titleLine) lines.push(titleLine);
      if (item.analysisDate) lines.push(item.analysisDate);
      if (item.stance) lines.push(item.stance);
      if (item.summary) { lines.push(""); lines.push(item.summary); }
      if (item.conclusion && item.conclusion !== item.summary) {
        lines.push(""); lines.push("結論"); lines.push(item.conclusion);
      }
      if (item.dataAsOf && typeof item.dataAsOf === "object") {
        const parts = Object.entries(item.dataAsOf).filter(([, v]) => v).map(([k, v]) => `${k}: ${v}`);
        if (parts.length) { lines.push(""); lines.push("資料基準"); lines.push(parts.join(" / ")); }
      }
      arr(item.sections || []).forEach(section => {
        lines.push(""); lines.push(section.title || "重點");
        const points = Array.isArray(section.points) ? section.points : [];
        if (points.length) {
          points.forEach((pt, i) => lines.push(`${i + 1}. ${stringify(pt)}`));
        } else if (section.body || section.text) {
          lines.push(stringify(section.body || section.text));
        }
      });
      if (item.technicalLevels && typeof item.technicalLevels === "object") {
        const lvl = item.technicalLevels;
        const supports = arr(lvl.support);
        const resistances = arr(lvl.resistance);
        if (supports.length || resistances.length || lvl.riskLine) {
          lines.push(""); lines.push("技術位階");
          if (supports.length) lines.push(`支撐：${supports.join("；")}`);
          if (resistances.length) lines.push(`壓力：${resistances.join("；")}`);
          if (lvl.riskLine) lines.push(`風控線：${lvl.riskLine}`);
        }
      }
      if (arr(item.valuationScenarios).length) {
        lines.push(""); lines.push("估值情境");
        arr(item.valuationScenarios).forEach((s, i) => {
          lines.push(`${i + 1}. ${s.case || "情境"}：${[s.assumption, s.view].filter(Boolean).join(" / ")}`);
        });
      }
      if (arr(item.aiReportRefs).length) {
        lines.push(""); lines.push("ai_reports 對照");
        arr(item.aiReportRefs).forEach((ref, i) => {
          lines.push(`${i + 1}. ${formatAiReportRefLabel(ref.file)}：${ref.match || ""}`);
        });
      }
      return lines.join("\n");
    }

    function findAnalysisReportMatches(keyword) {
      const terms = String(keyword || "").trim().split(/\s+/).filter(Boolean);
      if (!terms.length) {
        return state.aiReports.slice(0, 6).map(report => ({
          report,
          matches: 0,
          snippet: "輸入股票代號、公司名或產業詞後，可搜尋 ai_reports 內容。"
        }));
      }
      return state.aiReports.map(report => {
        const text = report.text || "";
        const lower = text.toLowerCase();
        const hitIndexes = terms.map(term => lower.indexOf(term.toLowerCase())).filter(index => index >= 0);
        return {
          report,
          matches: hitIndexes.length,
          snippet: hitIndexes.length ? makeAnalysisSnippet(text, hitIndexes[0]) : ""
        };
      }).filter(row => row.matches > 0)
        .sort((a, b) => b.matches - a.matches || b.report.episode - a.report.episode);
    }

    function makeAnalysisSnippet(text, index) {
      const start = Math.max(0, index - 90);
      const end = Math.min(text.length, index + 170);
      let snippet = text.slice(start, end).replace(/\s+/g, " ").trim();
      if (start > 0) snippet = `...${snippet}`;
      if (end < text.length) snippet = `${snippet}...`;
      return snippet;
    }

    function splitSummary(summary) {
      const text = String(summary || "").replace(/\s+/g, " ").trim();
      if (!text) {
        return [{ title: "摘要", points: ["節目未明確提及"] }];
      }

      const sentences = text
        .split(/(?<=[。！？])/)
        .map(item => item.trim())
        .filter(Boolean);

      const blocks = [];
      let current = null;

      sentences.forEach(sentence => {
        const title = detectSummaryTitle(sentence);
        if (!current || title !== current.title || current.points.length >= 5) {
          current = { title, points: [] };
          blocks.push(current);
        }
        current.points.push(sentence);
      });

      return blocks.map(block => ({
        title: block.title,
        points: mergeTinyPoints(block.points)
      }));
    }

    function detectSummaryTitle(sentence) {
      const rules = [
        ["開場與贊助", ["開場", "贊助", "東璧堂", "520"]],
        ["生活與健康", ["瘦瘦針", "減重", "公斤", "健康", "下背痛", "物理治療", "健身", "網球"]],
        ["市場主線", ["市場", "大盤", "修正", "多頭", "強勢", "輪動"]],
        ["被動元件", ["被動元件", "MLCC", "鋁電容", "Panasonic", "漲價", "斷供", "交期", "採購", "擴產"]],
        ["AI 與供應鏈", ["Broadcom", "Swordfish", "NVIDIA", "Google", "TPU", "愛普", "EPMEM", "載板", "老 AI", "IPD"]],
        ["Q&A 心法", ["Q&A", "問題", "聽眾", "主持人回應", "心法", "比較", "花錢", "光通", "Prompt"]]
      ];

      for (const [title, keywords] of rules) {
        if (keywords.some(keyword => sentence.includes(keyword))) {
          return title;
        }
      }
      return "其他重點";
    }

    function mergeTinyPoints(points) {
      const merged = [];
      points.forEach(point => {
        const last = merged[merged.length - 1];
        if (last && last.length < 36 && point.length < 72) {
          merged[merged.length - 1] = `${last}${point}`;
        } else {
          merged.push(point);
        }
      });
      return merged;
    }

    function stockRelevanceScore(item, ep) {
      const sentimentScore = { bullish: 40, watchful: 30, neutral: 20, bearish: 10 };
      const typeScore = { stock: 5, ETF: 3, sector: 2, theme: 1 };
      let score = sentimentScore[item.sentiment] || 20;
      if (item.hostOwned === true) score += 100;
      score += typeScore[item.type] || 0;
      const candidates = arr(((ep.data || {}).nextSteps || {}).opportunityCandidates);
      const itemTickers = arr(item.tickers).map(t => String(t).toUpperCase().trim()).filter(Boolean);
      const match = candidates.find(c => {
        const ct = String(c.ticker || "").toUpperCase().trim();
        if (ct && itemTickers.includes(ct)) return true;
        const cn = String(c.companyName || "").trim();
        const iN = String(item.name || "").trim();
        return cn && iN && (cn === iN || iN.includes(cn) || cn.includes(iN));
      });
      if (match) score += Number(match.opportunityScore) || 50;
      return score;
    }

    function normalizeTwCode(val) {
      const s = String(val || "").trim();
      const m = s.match(/^(\d{4})(?:\.TW)?$/i);
      return m ? m[1] : "";
    }

    function twSourcePriority(sources) {
      const src = arr(sources);
      if (src.includes("AI 優先研究候選")) return 0;
      if (src.includes("Podcast 直接列名")) return 1;
      if (src.includes("網路新聞補充")) return 2;
      if (src.includes("Podcast 主題關聯")) return 3;
      return 9;
    }

    function primaryTwSource(sources) {
      const src = arr(sources);
      for (const name of ["AI 優先研究候選", "Podcast 直接列名", "網路新聞補充", "Podcast 主題關聯"]) {
        if (src.includes(name)) return name;
      }
      return src[0] || "";
    }

    function normalizeTwWatchlistPayload(payload, manifest) {
      const rows = Array.isArray(payload.records) ? payload.records : [];
      return {
        generatedAt: payload.generatedAt || manifest.generatedAt || "",
        source: payload.source || manifest.source || "",
        count: Number(payload.count || manifest.count || rows.length) || rows.length,
        episodes: Array.isArray(payload.episodes) ? payload.episodes : (Array.isArray(manifest.episodes) ? manifest.episodes : []),
        records: rows.map(item => {
          const sources = arr(item.sources).map(value => String(value || "").trim()).filter(Boolean);
          const themes = arr(item.themes).map(value => String(value || "").trim()).filter(Boolean);
          const episodes = arr(item.episodes).map(value => String(value || "").trim()).filter(Boolean);
          const score = Number(item.score) || 0;
          const compositeScore = Number(item.compositeScore) || score;
          const latestSortRank = Number(item.latestSortRank) || 9999;
          const heatSortRank = Number(item.heatSortRank) || 9999;
          const latestRank = Number(item.latestRank) || 9999;
          const latestScore = Number(item.latestScore) || 0;
          const latestSourcePriority = Number(item.latestSourcePriority) || 9;
          return {
            code: normalizeTwCode(item.code),
            themes,
            sources,
            reasons: arr(item.reasons).map(value => String(value || "").trim()).filter(Boolean),
            episodes,
            latestEpisode: Number(item.latestEpisode) || 0,
            latestRank,
            latestScore,
            latestSourcePriority,
            rank: Number(item.rank) || 9999,
            score,
            compositeScore,
            latestSortRank,
            heatSortRank,
            sourcePriority: twSourcePriority(sources),
            hostOwned: item.hostOwned === true
          };
        }).filter(item => item.code)
      };
    }

    function computeTwWatchlist() {
      const twRules = getTwThemeRules();

      const records = {};

      function addOrMerge(code, { theme, source, score, rank, episode, episodeTitle, hostOwned }) {
        const c = normalizeTwCode(code);
        if (!c) return;
        if (!records[c]) {
          records[c] = { code: c, themes: [], sources: [], episodes: [], latestEpisode: 0, latestRank: 9999, latestScore: 0, latestSourcePriority: 9, rank: 9999, score: 0, hostOwned: false };
        }
        const r = records[c];
        if (!r.themes.includes(theme)) r.themes.push(theme);
        if (!r.sources.includes(source)) r.sources.push(source);
        if (episode > 0) {
          const epText = episodeTitle ? `EP${episode} ${episodeTitle}` : `EP${episode}`;
          if (!r.episodes.includes(epText)) r.episodes.push(epText);
          const sourcePriority = twSourcePriority([source]);
          if (episode > r.latestEpisode) {
            r.latestEpisode = episode;
            r.latestRank = 9999;
            r.latestScore = 0;
            r.latestSourcePriority = 9;
          }
          if (episode === r.latestEpisode) {
            if (rank > 0 && rank < r.latestRank) r.latestRank = rank;
            if (score > r.latestScore) r.latestScore = score;
            if (sourcePriority < r.latestSourcePriority) r.latestSourcePriority = sourcePriority;
          }
        }
        if (rank > 0 && rank < r.rank) r.rank = rank;
        if (score > r.score) r.score = score;
        if (hostOwned) r.hostOwned = true;
      }

      for (const ep of state.episodes) {
        const data = ep.data || {};
        const epNum = Number(data.episode || data.number || ep.number) || 0;
        const epTitle = data.title || ep.title || "";
        const haystack = JSON.stringify(data).toLowerCase();

        // Tier 1: AI 優先研究候選
        for (const c of arr((data.nextSteps || {}).opportunityCandidates || [])) {
          if (c.market && c.market !== "TW") continue;
          const code = normalizeTwCode(c.ticker);
          if (!code) continue;
          const owned = arr(data.stockAnalysis || []).some(s =>
            s.hostOwned === true && arr(s.tickers || []).some(t => normalizeTwCode(String(t)) === code)
          );
          addOrMerge(code, { theme: String(c.theme || ""), source: "AI 優先研究候選", score: Number(c.opportunityScore) || 0, rank: Number(c.rank) || 9999, episode: epNum, episodeTitle: epTitle, hostOwned: owned });
        }

        // Tier 2: 網路新聞補充 (with heatLevel weighting)
        for (const d of arr((data.nextSteps || {}).webDiscussion || [])) {
          const heatScore = { high: 15, medium: 10, low: 5 }[d.heatLevel] || 3;
          for (const n of arr(d.recentNews || [])) {
            for (const ticker of arr(n.relatedTickers || [])) {
              const code = normalizeTwCode(ticker);
              if (!code) continue;
              addOrMerge(code, { theme: String(d.theme || ""), source: "網路新聞補充", score: heatScore, rank: 9999, episode: epNum, episodeTitle: epTitle, hostOwned: false });
            }
          }
        }

        // Tier 3: Podcast 主題關聯
        for (const rule of twRules) {
          if (!rule.keywords.some(kw => haystack.includes(kw))) continue;
          for (const code of rule.codes) {
            addOrMerge(code, { theme: rule.theme, source: "Podcast 主題關聯", score: 5, rank: 9999, episode: epNum, episodeTitle: epTitle, hostOwned: false });
          }
        }
      }

      const maxEp = Math.max(0, ...state.episodes.map(ep => Number((ep.data || {}).episode || ep.number) || 0));

      return Object.values(records).map(r => {
        const recencyBonus  = maxEp > 0 ? Math.round((r.latestEpisode / maxEp) * 20) : 0;
        const breadthBonus  = Math.min(r.episodes.length * 5, 30);
        const hostBonus     = r.hostOwned ? 50 : 0;
        const sourcePriority = twSourcePriority(r.sources);
        const compositeScore = r.score + recencyBonus + breadthBonus + hostBonus;
        return { ...r, compositeScore, sourcePriority };
      });
    }

    function renderTwWatchlistMain() {
      dom.main.replaceChildren();

      if (!state.twWatchlist && !state.episodes.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "尚未載入台股清單或集數資料，請先用本機 server 開啟 viewer，或拖入 JSON 檔";
        dom.main.appendChild(empty);
        return;
      }

      const loadedWatchlist = state.twWatchlist && Array.isArray(state.twWatchlist.records) && state.twWatchlist.records.length ? state.twWatchlist : null;
      const allRecords = loadedWatchlist ? loadedWatchlist.records : computeTwWatchlist();

      // filter
      let records = allRecords;
      const srcFilter = state.filters.twSource;
      if (srcFilter !== "all") records = records.filter(r => r.sources.includes(srcFilter));

      const epNums = loadedWatchlist
        ? [...new Set(arr(loadedWatchlist.episodes).map(ep => Number(ep.episode || ep.number) || 0).filter(Boolean))].sort((a, b) => a - b)
        : [...new Set(state.episodes.map(ep => Number((ep.data || {}).episode || ep.number) || 0).filter(Boolean))].sort((a, b) => a - b);
      const newestEp = epNums.length ? epNums[epNums.length - 1] : Math.max(0, ...records.map(r => Number(r.latestEpisode) || 0));

      function latestFallbackCompare(a, b) {
        const aSort = Number(a.latestSortRank) || 9999;
        const bSort = Number(b.latestSortRank) || 9999;
        if (aSort !== 9999 || bSort !== 9999) return aSort - bSort;
        const aLatest = Number(a.latestEpisode) === newestEp ? 0 : 1;
        const bLatest = Number(b.latestEpisode) === newestEp ? 0 : 1;
        if (aLatest !== bLatest) return aLatest - bLatest;
        const aSource = Number(a.latestSourcePriority) || (Number(a.sourcePriority) + 1) || 9;
        const bSource = Number(b.latestSourcePriority) || (Number(b.sourcePriority) + 1) || 9;
        if (aSource !== bSource) return aSource - bSource;
        const aRank = aSource === 1 ? Number(a.latestRank || a.rank || 9999) : 9999;
        const bRank = bSource === 1 ? Number(b.latestRank || b.rank || 9999) : 9999;
        if (aRank !== bRank) return aRank - bRank;
        return (Number(b.latestScore) || 0) - (Number(a.latestScore) || 0) || (Number(b.compositeScore) || 0) - (Number(a.compositeScore) || 0) || String(a.code).localeCompare(String(b.code));
      }

      function heatFallbackCompare(a, b) {
        const aSort = Number(a.heatSortRank) || 9999;
        const bSort = Number(b.heatSortRank) || 9999;
        if (aSort !== 9999 || bSort !== 9999) return aSort - bSort;
        return (Number(b.compositeScore) || 0) - (Number(a.compositeScore) || 0) || (Number(a.sourcePriority) || 9) - (Number(b.sourcePriority) || 9) || (Number(b.latestEpisode) || 0) - (Number(a.latestEpisode) || 0);
      }

      // sort
      const sortKey = state.filters.twSort;
      if (sortKey === "latest") {
        records = [...records].sort(latestFallbackCompare);
      } else if (sortKey === "relevance") {
        records = [...records].sort(heatFallbackCompare);
      } else if (sortKey === "episode") {
        records = [...records].sort((a, b) => b.latestEpisode - a.latestEpisode || b.compositeScore - a.compositeScore);
      } else {
        records = [...records].sort((a, b) => a.sourcePriority - b.sourcePriority || b.compositeScore - a.compositeScore);
      }

      const scoreValue = r => sortKey === "latest" && Number(r.latestEpisode) === newestEp && Number(r.latestScore) > 0 ? Number(r.latestScore) : Number(r.compositeScore) || 0;
      const maxScore = Math.max(1, ...records.map(scoreValue));
      const epRange = epNums.length ? `EP${epNums[0]}–${epNums[epNums.length - 1]}` : "來源集數未提供";

      const page = document.createElement("div");
      page.className = "tw-page";

      // Header
      const hdr = document.createElement("div");
      hdr.className = "tw-header";
      const h2 = document.createElement("h2");
      h2.textContent = "台股關注清單";
      const meta = document.createElement("span");
      meta.className = "tw-meta";
      meta.textContent = loadedWatchlist
        ? `共 ${allRecords.length} 檔 · ${epRange} · 最新集優先 / 近十集熱度可切換 · ${loadedWatchlist.generatedAt || ""}`
        : `共 ${allRecords.length} 檔 · ${epRange} · 最新集優先 / 近十集熱度可切換`;
      hdr.append(h2, meta);
      page.appendChild(hdr);

      // Copy row
      const copyRow = document.createElement("div");

      copyBtn.type = "button";

      copyBtn.textContent = `複製 ${records.length} 檔 XQ 代碼`;
      copyBtn.addEventListener("click", () => {

        navigator.clipboard.writeText(codes).then(() => {

        });

      const note = document.createElement("span");
      note.className = "tw-meta";
      note.textContent = loadedWatchlist
        ? "最新集優先保留完整股票池；近十集熱度保留 compositeScore"
        : "最新集優先保留完整股票池；近十集熱度保留 compositeScore";
      copyRow.append(copyBtn, note);
      page.appendChild(copyRow);

      const disclaimer = document.createElement("div");
      disclaimer.className = "tw-disclaimer";
      disclaimer.textContent = "提醒：台股關注清單是研究與觀察池，非直接購買建議；請自行判斷進出場條件，例如均線糾結後是否轉為多頭排列、量價確認、支撐壓力與停損控管。";
      page.appendChild(disclaimer);

      // Toolbar
      const toolbar = document.createElement("div");
      toolbar.className = "tw-toolbar";
      toolbar.append(
        selectBox("twSort", "排序方式", [
          ["latest", "最新集優先"],

        ], state.filters.twSort),
        selectBox("twSource", "全部來源", [

      );
      page.appendChild(toolbar);

      if (!records.length) {
        const empty = document.createElement("div");

        page.appendChild(empty);

        return;
      }

      const wrap = document.createElement("div");
      wrap.className = "tw-table-wrap";
      const table = document.createElement("table");
      table.className = "tw-table";

      const thead = document.createElement("thead");
      const hrow = document.createElement("tr");
      for (const col of ["#", "代碼", "名稱", "產業", "來源", "相關主題", "出現集數", "相關分數"]) {

      records.forEach((r, i) => {
        const stockInfo = state.stockUniverse.find(s => String(s.code || "").replace(/\.TW$/i, "") === r.code);
        const name = stockInfo ? String(stockInfo.name || "") : "";
        const industry = stockInfo ? String(stockInfo.industry || "") : "";

        const tierLabel = r.sources.includes("AI 優先研究候選") ? "A" : (r.sources.includes("Podcast 直接列名") || r.sources.includes("網路新聞補充")) ? "B" : "C";
        const rowScore = scoreValue(r);
        const barPx = Math.round((rowScore / maxScore) * 60);

        const tr = document.createElement("tr");

        const tdNum = document.createElement("td"); tdNum.textContent = String(i + 1);
        const tdCode = document.createElement("td"); tdCode.textContent = r.code;
        tdCode.style.fontWeight = "600";
        const tdName = document.createElement("td"); tdName.textContent = name || "-";
        const tdInd = document.createElement("td"); tdInd.textContent = industry || "-";

        const tdTier = document.createElement("td");
        const tierBadge = document.createElement("span");
        tierBadge.className = `tw-tier tw-tier-${tierLabel}`;
        tierBadge.textContent = tierLabel;
        const tierText = document.createTextNode(" " + primaryTwSource(r.sources));
        tdTier.append(tierBadge, tierText);

        const tdTheme = document.createElement("td");
        tdTheme.textContent = r.themes.slice(0, 2).join("、") || "-";

        const tdEps = document.createElement("td");
        tdEps.textContent = r.episodes.slice(0, 3).join("、") || "-";

        const tdScore = document.createElement("td");
        const scoreBar = document.createElement("div");
        scoreBar.className = "tw-score-bar";
        const fill = document.createElement("div");
        fill.className = "tw-score-bar-fill";
        fill.style.width = `${barPx}px`;
        const scoreNum = document.createElement("span");
        scoreNum.textContent = String(rowScore);
        if (r.hostOwned) {
          const owned = document.createElement("span");
          owned.style.cssText = "margin-left:4px;font-size:0.72rem;color:var(--teal);font-weight:700;";
          owned.textContent = "持有";
          scoreBar.append(fill, scoreNum, owned);
        } else {
          scoreBar.append(fill, scoreNum);
        }
        tdScore.appendChild(scoreBar);

        tr.append(tdNum, tdCode, tdName, tdInd, tdTier, tdTheme, tdEps, tdScore);
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      wrap.appendChild(table);
      page.appendChild(wrap);
      dom.main.appendChild(page);
    }
