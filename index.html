    function buildTopTwStockAnalyses(ep, limit = 9) {
      const data = ep.data || {};
      const next = data.nextSteps && typeof data.nextSteps === "object" ? data.nextSteps : {};
      const records = {};
      const defaultChecks = ["月營收", "毛利率", "法說會", "產品線/客戶曝險", "籌碼與股價位置"];

      function stockInfoForCode(code) {
        return state.stockUniverse.find(item => String(item.code || "").replace(/\.TW$/i, "") === code) || {};
      }

      function addOrMerge(code, payload) {
        const c = normalizeTwCode(code);
        if (!c) return;
        if (!records[c]) {
          const info = stockInfoForCode(c);
          records[c] = {
            code: c,
            name: info.name || payload.name || "",
            industry: info.industry || "",
            score: 0,
            sources: [],
            themes: [],
            reasons: [],
            analyses: [],
            checks: [],
            risks: [],
            hostOwned: false
          };
        }

        const row = records[c];
        row.name = row.name || payload.name || "";
        row.industry = row.industry || payload.industry || "";
        row.score += Number(payload.score) || 0;
        row.hostOwned = row.hostOwned || payload.hostOwned === true;

        [payload.source].flat().filter(Boolean).forEach(value => {
          if (!row.sources.includes(value)) row.sources.push(value);
        });
        [payload.themes || payload.theme].flat().filter(Boolean).forEach(value => {
          if (!row.themes.includes(value)) row.themes.push(value);
        });
        [payload.reasons || payload.reason].flat().filter(Boolean).forEach(value => {
          if (!row.reasons.includes(value)) row.reasons.push(value);
        });
        [payload.analyses || payload.analysis].flat().filter(Boolean).forEach(value => {
          if (!row.analyses.includes(value)) row.analyses.push(value);
        });
        arr(payload.checks).filter(Boolean).forEach(value => {
          if (!row.checks.includes(value)) row.checks.push(value);
        });
        [payload.risks || payload.risk].flat().filter(Boolean).forEach(value => {
          if (!row.risks.includes(value)) row.risks.push(value);
        });
      }

      const sentimentScore = { bullish: 70, watchful: 55, neutral: 35, bearish: 20 };
      arr(data.stockAnalysis).forEach(item => {
        if (item.type === "ETF") return;
        const tickerCodes = arr(item.tickers).map(normalizeTwCode).filter(Boolean);
        tickerCodes.forEach(code => {
          const base = sentimentScore[item.sentiment] || 35;
          const ownedBonus = item.hostOwned === true ? 90 : 0;
          const typeBonus = item.type === "stock" ? 25 : 0;
          addOrMerge(code, {
            name: item.name || "",
            source: "Podcast 標的觀點",
            theme: item.name || "節目明確標的",
            score: base + ownedBonus + typeBonus,
            hostOwned: item.hostOwned,
            reason: `${item.name || code} 是本集 stockAnalysis 明確收錄標的，情緒為 ${item.sentiment || "neutral"}。`,
            analysis: item.analysis || "",
            checks: arr(item.sourceRefs).length ? [`回查來源 ${arr(item.sourceRefs).join("、")}`, ...defaultChecks] : defaultChecks,
            risk: item.risk || "節目未明確提及"
          });
        });
      });

      arr(next.opportunityCandidates).forEach(item => {
        if (item.market && item.market !== "TW") return;
        const code = normalizeTwCode(item.ticker);
        if (!code) return;
        addOrMerge(code, {
          name: item.companyName || item.name || "",
          source: "AI 優先研究候選",
          theme: item.theme || "AI 優先研究候選",
          score: 100 + (Number(item.opportunityScore) || 0),
          reason: item.whySelected || "JSON 已列為 AI 優先研究候選。",
          analysis: item.podcastLink || item.whySelected || "",
          checks: arr(item.whatToCheckNext).length ? item.whatToCheckNext : defaultChecks,
          risk: arr(item.risks).join("；") || "此為優先研究候選，不是買進建議。"
        });
      });

      arr(next.webDiscussion).forEach(item => {
        const heatScore = { high: 30, medium: 20, low: 10 }[item.heatLevel] || 6;
        arr(item.recentNews).forEach(news => {
          arr(news.relatedTickers).forEach(ticker => {
            const code = normalizeTwCode(ticker);
            if (!code) return;
            addOrMerge(code, {
              source: "網路新聞補充",
              theme: item.theme || "網路討論",
              score: heatScore,
              reason: news.whyItMatters || item.podcastComparison || "網路補充資料提到此 ticker。",
              analysis: news.summary || "",
              checks: arr(item.watchSignals).length ? item.watchSignals : defaultChecks,
              risk: arr(item.redFlags).join("；") || "需確認外部資料是否仍有效。"
            });
          });
        });
      });

      const haystack = JSON.stringify({
        summary: data.summary,
        news: data.news,
        stockAnalysis: data.stockAnalysis,
        hostDisclosure: data.hostDisclosure,
        nextSteps: data.nextSteps
      }).toLowerCase();

      getTwThemeRules().forEach(rule => {
        const matched = rule.keywords.filter(keyword => haystack.includes(String(keyword).toLowerCase()));
        if (!matched.length) return;
        const score = 16 + Math.min(matched.length * 4, 24);
        rule.codes.forEach(code => {
          addOrMerge(code, {
            source: "Podcast 主題關聯",
            theme: rule.theme,
            score,
            reason: `當集內容命中「${matched.slice(0, 4).join("、")}」，對應台股主題「${rule.theme}」。`,
            analysis: `此檔由主題規則對應而來，代表它可能位於「${rule.theme}」候選池；仍需自行驗證產品、營收占比、客戶、交期與法說內容。`,
            checks: defaultChecks,
            risk: "這是主題關聯候選，節目不一定逐名點到；若公司產品或營收無法對應主題，應降權或移出。"
          });
        });
      });

      return Object.values(records)
        .map(row => {
          const info = stockInfoForCode(row.code);
          const checks = Array.from(new Set([...row.checks, ...defaultChecks])).slice(0, 8);
          return {
            ...row,
            name: row.name || info.name || "-",
            industry: row.industry || info.industry || "-",
            score: Math.round(row.score),
            reason: row.reasons[0] || "與本集主題相關。",

    function appendCandidatePoolSummary(parent, item, categoryStocks) {
      if (!categoryStocks.length) return;

        .map(row => `${row.industry} ${row.count} 檔`);
      appendChipList(parent, "官方分類範圍", categoryCounts);

      if (categoryStocks.length <= 40) {
        appendStockList(parent, `官方產業候選池（${categoryStocks.length} 檔）`, categoryStocks);
        return;
      }

      appendField(parent, "官方池說明", `這個官方分類共有 ${categoryStocks.length} 檔，範圍太大；直接列前 30 檔會很隨機，所以這裡只把它當作第一層入口。真正有用的候選名單，必須再用產品關鍵字與業務曝險縮小。`);
      appendList(parent, "縮小候選池", buildNarrowingSteps(item));

    function groupStockCountsByIndustry(stocks) {
      const counts = new Map();
      stocks.forEach(item => {
        const industry = item.industry || "未分類";
        counts.set(industry, (counts.get(industry) || 0) + 1);
      });
      return Array.from(counts, ([industry, count]) => ({ industry, count }))
        .sort((a, b) => a.industry.localeCompare(b.industry, "zh-Hant"));
    }

    function buildNarrowingSteps(item) {
      const keywordText = arr(item.keywords).slice(0, 6).join("、") || "本集主題關鍵字";
      const exposureText = arr(item.businessExposureToVerify).slice(0, 3).join("、") || "產品線、營收占比、客戶結構";
      return [
        `先在官方分類裡搜尋「${keywordText}」，找出業務描述真的對得上的公司。`,
        `逐一查 ${exposureText}，排除只是沾概念、沒有量產或營收占比太低的公司。`,
        "留下來的公司再看月營收、毛利率、法說會、報價/交期/訂單與產能變化。",
        "最後才比較股價位置、成交量與市場情緒，避免只是題材熱但基本面還沒跟上。"

      const categories = normalizeIndustryCategories(item.twIndustryCategories || item.categories || item.twCategories);

      return {
        theme: item.theme || item.watchlistName || "未命名主題",

        categories,
        keywords: unique(arr(item.searchKeywords || item.keywords).map(value => stringify(value)).filter(Boolean)),

        nextMove: item.candidatePoolRule || item.suggestedNextMove || item.nextMove || "",
        businessExposureToVerify: arr(item.businessExposureToVerify || item.exposureToVerify),
        excludeIf: arr(item.excludeIf),

        dataSourcesToCheck: arr(item.dataSourcesToCheck || item.dataSources),
        podcastBoundaries: item.podcastBoundaries || ""

    function normalizeIndustryCategories(values) {
      return unique(arr(values)
        .map(value => stringify(value).trim())
        .filter(value => value && value !== "[]" && value !== "不適用" && value !== "節目未明確提及"));
    }

    function normalizeStockCandidate(value) {
      if (!value) return null;
      if (typeof value === "object") {
        const code = stringify(value.code || value.ticker || "").replace("節目未明確提及", "").trim();
        const name = stringify(value.name || value.company || value.target || "").replace("節目未明確提及", "").trim();
        if (!code && !name) return null;
        return stock(code, name);
      }
      const text = stringify(value).trim();
      if (!text || text === "節目未明確提及") return null;
      return { code: "", name: text, market: "", industry: "" };
    }

      const seedCandidates = [];

      return {
        theme: theme.theme || "未命名主題",
        priority: theme.priority || "",
        categories,
        keywords: searchKeywords,
        seedCandidates,
        nextMove: theme.suggestedNextMove || "",
        businessExposureToVerify: [],

        rankingChecks: [],
        dataSourcesToCheck: [],
        podcastBoundaries: ""

    function stock(code, name) {
      const fromUniverse = state.stockUniverse.find(item => item.code === code);
      if (fromUniverse) return fromUniverse;
      return { code, name, market: "", industry: "" };
    }

    function findStocksByCategories(categories) {
      if (!categories.length || !state.stockUniverse.length) return [];
      return state.stockUniverse
        .filter(stockItem => categories.includes(stockItem.industry))
        .sort((a, b) => a.code.localeCompare(b.code, "zh-Hant"));
    }

    function appendChipList(parent, labelText, values) {
      const label = fieldLabel(labelText);
      const row = document.createElement("div");
      row.className = "card-meta";
      row.style.justifyContent = "flex-start";
      arr(values).forEach(value => row.appendChild(badge(value, value)));
      if (!row.childElementCount) row.appendChild(badge("無明確分類", ""));
      parent.append(label, row);
    }

    function appendStockList(parent, labelText, stocks) {
      const label = fieldLabel(labelText);
      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      const table = document.createElement("table");
      table.appendChild(tableHead(["代號", "名稱", "市場", "產業"]));
      const tbody = document.createElement("tbody");
      stocks.forEach(item => {
        const tr = document.createElement("tr");
        ["code", "name", "market", "industry"].forEach(key => {
          const td = document.createElement("td");
          td.textContent = item[key] || "";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      wrap.appendChild(table);
      parent.append(label, wrap);
    }

    function dedupeStocks(stocks) {
      const seen = new Set();
      return stocks.filter(item => {
        const key = item.code || item.name;
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function filterEntries(entries, predicate) {
      return entries.filter(item => {
        if (!predicate(item)) return false;
        if (!state.query) return true;
        return JSON.stringify(item).toLowerCase().includes(state.query);
      });
    }

    function selectBox(filterKey, allLabel, values, current) {
      const select = document.createElement("select");
      select.className = "select";
      const all = document.createElement("option");
      all.value = "all";
      all.textContent = allLabel;
      select.appendChild(all);

      values.forEach(value => {
        const option = document.createElement("option");
        if (Array.isArray(value)) {
          option.value = value[0];
          option.textContent = value[1];
        } else {
          option.value = value;
          option.textContent = value;
        }
        select.appendChild(option);
      });

      select.value = current;
      select.addEventListener("change", event => {
        state.filters[filterKey] = event.target.value;
        render();
      });
      return select;
    }

    function sectionCard() {
      const card = document.createElement("article");
      card.className = "section-card";
      return card;
    }

    function cardHead(titleText, badges) {
      const head = document.createElement("div");
      head.className = "card-head";
      const title = document.createElement("div");
      title.className = "card-title";
      title.textContent = titleText;
      const meta = document.createElement("div");
      meta.className = "card-meta";
      badges.filter(Boolean).forEach(item => meta.appendChild(item));
      head.append(title, meta);
      return head;
    }

    function appendField(parent, labelText, value) {
      const label = fieldLabel(labelText);
      const text = document.createElement("div");
      text.className = "body-text";
      text.textContent = stringify(value);
      parent.append(label, text);
    }

    function appendList(parent, labelText, values) {
      const label = fieldLabel(labelText);
      const list = document.createElement("ol");
      list.className = "points";
      arr(values).forEach(value => {
        const li = document.createElement("li");
        li.textContent = stringify(value);
        list.appendChild(li);
      });
      if (!list.childElementCount) {
        const li = document.createElement("li");
        li.textContent = "節目未明確提及";
        list.appendChild(li);
      }
      parent.append(label, list);
    }

    function appendTargetsWithCategories(parent, labelText, values) {
      const label = fieldLabel(labelText);
      const list = document.createElement("ol");
      list.className = "points";

      arr(values).forEach(value => {
        const target = stringify(value);
        const li = document.createElement("li");
        const targetText = document.createElement("span");
        targetText.textContent = target;
        li.appendChild(targetText);

        classifyTarget(target).forEach(category => {
          li.appendChild(document.createTextNode(" "));
          li.appendChild(badge(category, category));
        });

        list.appendChild(li);
      });

      if (!list.childElementCount) {
        const li = document.createElement("li");
        li.textContent = "節目未明確提及";
        list.appendChild(li);
      }

      parent.append(label, list);
    }

    function classifyTarget(target) {
      const text = String(target || "").toLowerCase();
      const raw = String(target || "");
      const nonTaiwanKeywords = [
        "panasonic", "broadcom", "nvidia", "google", "crowdstrike", "figma", "atlassian",
        "rohm", "羅姆", "美股", "葡萄酒", "紅酒", "nordvpn", "東璧堂", "施景中", "醫師",
        "遊戲", "蕭南資本", "紅顏綠筆", "暗花夜戰", "noa bloom", "perplexity", "opus", "gpt",
        "0050", "etf", "fcn", "定息票據", "指數投資", "大盤指數"
      ];
      if (nonTaiwanKeywords.some(keyword => text.includes(keyword.toLowerCase()) || raw.includes(keyword))) {
        return [];
      }

      const rules = [
        ["16. 半導體", ["半導體", "台積電", "tsmc", "聯發科", "mediatek", "晶片", "先進製程", "愛普", "epmem", "記憶體", "dram", "hbm"]],
        ["17. 電腦及週邊設備", ["伺服器", "server", "odm", "oem", "電腦及週邊", "近年代工", "老 ai", "new ai", "ai 硬體"]],
        ["18. 光電", ["光電", "玻璃基板", "面板", "光學"]],
        ["19. 通信網路", ["光通", "光設備", "通信", "網路", "network", "低軌", "衛星"]],
        ["20. 電子零組件", ["被動元件", "mlcc", "鋁電容", "鋁電解", "電容", "電感", "電阻", "載板", "substrate", "ccl", "power components", "離散元件", "ipd", "integrated passive"]],
        ["22. 資訊服務", ["台股軟體", "資訊服務"]],
        ["23. 其他電子", ["電子全部", "硬體", "power", "電源架", "電源機箱"]],
        ["29. 油電燃氣", ["油價", "石油", "燃氣"]],
        ["34. 數位雲端", ["雲端", "cloud", "數位雲端"]]
      ];

      const matched = [];
      rules.forEach(([category, keywords]) => {
        if (keywords.some(keyword => text.includes(keyword.toLowerCase()) || raw.includes(keyword))) {
          matched.push(category);
        }
      });

      if (matched.length) {
        return Array.from(new Set(matched));
      }

      return [];
    }

    function fieldLabel(labelText) {
      const label = document.createElement("div");
      label.className = "muted";
      label.style.marginTop = "8px";
      label.style.fontSize = "12px";
      label.style.fontWeight = "800";
      label.textContent = labelText;
      return label;
    }

    function appendEmpty(container, text) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = text;
      container.appendChild(empty);
    }

    function badge(text, variant) {
      const node = document.createElement("span");
      node.className = `badge ${safeClass(variant)}`;
      node.textContent = text || "-";
      return node;
    }

    function tableHead(labels) {
      const thead = document.createElement("thead");
      const tr = document.createElement("tr");
      labels.forEach(label => {
        const th = document.createElement("th");
        th.textContent = label;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      return thead;
    }

    function safeClass(value) {
      return String(value || "").replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function sourceBadge(value) {
      if (Array.isArray(value)) {
        return value.length ? badge(value.join(", "), "") : null;
      }
      return value ? badge(value, "") : null;
    }

    function hostOwnedLabel(value) {
      if (value === true) return "主持人持有";
      if (value === false) return "主持人未持有";
      return "未揭露";
    }

    function formatBytes(value) {
      const bytes = Number(value) || 0;
      if (bytes <= 0) return "0 B";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function arr(value) {
      return Array.isArray(value) ? value : [];
    }

    function unique(values) {
      return Array.from(new Set(values)).sort((a, b) => String(a).localeCompare(String(b), "zh-Hant"));
    }

    function stringify(value) {
      if (value === null || value === undefined || value === "") return "節目未明確提及";
      if (Array.isArray(value)) return value.length ? value.map(stringify).join(", ") : "[]";
      if (typeof value === "object") return JSON.stringify(value);
      return String(value);
    }
